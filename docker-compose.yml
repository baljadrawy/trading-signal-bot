# يعمل على: Raspberry Pi 4 (arm64) و Hetzner VPS (amd64)
# ملاحظة: postgres يعمل كخدمة مشتركة في /home/tradmin/shared-postgres

networks:
  trading_network:
    driver: bridge
  shared_db_net:
    external: true

volumes:
  models_data:
  logs_data:

services:

  # ==================== Scanner ====================
  scanner:
    build:
      context: .
      dockerfile: scanner/Dockerfile
    container_name: trading_scanner
    restart: unless-stopped
    env_file: .env
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./scanner:/app
    networks:
      - trading_network
      - shared_db_net
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import asyncpg' && grep -q python /proc/1/cmdline"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # ==================== Analyzer ====================
  analyzer:
    build:
      context: .
      dockerfile: analyzer/Dockerfile
    container_name: trading_analyzer
    restart: unless-stopped
    env_file: .env
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./analyzer:/app
      - models_data:/app/models
    networks:
      - trading_network
      - shared_db_net
    healthcheck:
      test: ["CMD-SHELL", "grep -q python /proc/1/cmdline"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.5'

  # ==================== Signal Engine ====================
  signal_engine:
    build:
      context: .
      dockerfile: signal_engine/Dockerfile
    container_name: trading_signal_engine
    restart: unless-stopped
    env_file: .env
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./signal_engine:/app
      - models_data:/app/models
    networks:
      - trading_network
      - shared_db_net
    healthcheck:
      test: ["CMD-SHELL", "grep -q python /proc/1/cmdline"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # ==================== Claude Review ====================
  claude_review:
    build:
      context: .
      dockerfile: claude_review/Dockerfile
    container_name: trading_claude_review
    restart: unless-stopped
    env_file: .env
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./claude_review:/app
    networks:
      - trading_network
      - shared_db_net
    healthcheck:
      test: ["CMD-SHELL", "grep -q python /proc/1/cmdline"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m

  # ==================== Trade Tracker ====================
  trade_tracker:
    build:
      context: .
      dockerfile: trade_tracker/Dockerfile
    container_name: trading_tracker
    restart: unless-stopped
    env_file: .env
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./trade_tracker:/app
    networks:
      - trading_network
      - shared_db_net
    healthcheck:
      test: ["CMD-SHELL", "grep -q python /proc/1/cmdline"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m

  # ==================== Optimizer Agent ====================
  optimizer:
    build:
      context: .
      dockerfile: optimizer/Dockerfile
    container_name: trading_optimizer
    restart: unless-stopped
    env_file: .env
    volumes:
      - logs_data:/app/logs
    networks:
      - trading_network
      - shared_db_net
    healthcheck:
      test: ["CMD-SHELL", "grep -q python /proc/1/cmdline"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m

  # ==================== Telegram ====================
  telegram:
    build:
      context: .
      dockerfile: telegram/Dockerfile
    container_name: trading_telegram
    restart: unless-stopped
    env_file: .env
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./telegram:/app
    networks:
      - trading_network
      - shared_db_net
    healthcheck:
      test: ["CMD-SHELL", "grep -q python /proc/1/cmdline"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
