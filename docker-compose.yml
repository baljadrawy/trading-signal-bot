# يعمل على: Raspberry Pi 4 (arm64) و Hetzner VPS (amd64)

networks:
  trading_network:
    driver: bridge

volumes:
  postgres_data:
  models_data:
  logs_data:

services:

  # ==================== قاعدة البيانات ====================
  postgres:
    image: postgres:16-alpine
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - trading_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  # ==================== Scanner ====================
  scanner:
    build:
      context: .
      dockerfile: scanner/Dockerfile
    container_name: trading_scanner
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./scanner:/app
    networks:
      - trading_network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # ==================== Analyzer ====================
  analyzer:
    build:
      context: .
      dockerfile: analyzer/Dockerfile
    container_name: trading_analyzer
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./analyzer:/app
      - models_data:/app/models
    networks:
      - trading_network
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.5'

  # ==================== Signal Engine ====================
  signal_engine:
    build:
      context: .
      dockerfile: signal_engine/Dockerfile
    container_name: trading_signal_engine
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./signal_engine:/app
      - models_data:/app/models
    networks:
      - trading_network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # ==================== Claude Review ====================
  claude_review:
    build:
      context: .
      dockerfile: claude_review/Dockerfile
    container_name: trading_claude_review
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./claude_review:/app
    networks:
      - trading_network
    deploy:
      resources:
        limits:
          memory: 256m

  # ==================== Telegram ====================
  telegram:
    build:
      context: .
      dockerfile: telegram/Dockerfile
    container_name: trading_telegram
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
      - ./shared:/app/shared
      - ./telegram:/app
    networks:
      - trading_network
    deploy:
      resources:
        limits:
          memory: 256m
